name: Documentation Build and Deploy

on:
    # PR作成/更新時にビルドチェック
    pull_request:
      branches:
        - master
    # masterへのpush時にビルド + Pagesデプロイ
    push:
      branches:
        - master
    # 手動実行も可能
    workflow_dispatch:

# Pages デプロイに必要な権限
permissions:
  contents: read
  issues: read
  pages: write
  id-token: write

# 同時に複数のデプロイが走らないようにする
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            plantuml \
            graphviz \
            fonts-noto-cjk

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install

      - name: Install Python dependencies
        run: uv sync

      - name: Generate worklog report
        env:
          GH_TOKEN: ${{ github.token }}
        # 進捗レポート生成はドキュメント本体のビルドを止めない（ソフト依存）
        continue-on-error: true
        run: uv run python scripts/collect_worklog.py

      - name: Build documentation
        run: uv run sphinx-build -b html -W docs _build/html

      - name: Upload artifact
        # Pages デプロイ用、master の push 時のみ
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    name: Deploy to GitHub Pages
    # master の push 時のみ実行
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
